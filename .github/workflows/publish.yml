name: Publish release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  prove-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
      - name: Check that tagged commit is on main
        run: |
          if ! git branch -r --contains "$GITHUB_SHA" | grep -qE '(^|\s)origin/main$'; then
            echo "::error::Tag $GITHUB_REF_NAME points to $GITHUB_SHA which is not on main"
            exit 1
          fi
  publish:
    name: Upload release to PyPI
    needs: prove-main
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: "https://pypi.org/p/mcp-hydrolix"
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - run: uv python install
      # This repo publishes ONLY the Hydrolix distribution to PyPI. The
      # mcp-trafficpeak wheel is published by the sibling repo (which checks out
      # this repo at the tag and runs the brand build), dispatched below.
      - run: MCP_BRAND=hydrolix uv build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
  dispatch-trafficpeak:
    # Fire off the sibling repo's publish workflow once the Hydrolix wheel is up, so
    # mcp-trafficpeak is published at the same version from the same commit. A
    # failed dispatch fails the release (artifact-parity invariant); recover with
    # `gh workflow run publish.yml -R hydrolix/mcp-trafficpeak -f tag=<tag>`.
    # Reuses the existing GitHub App (ci/development/mcp-hydrolix/APP_SECRET),
    # minting a token scoped to hydrolix/mcp-trafficpeak. The App must be
    # installed on that repo with `actions: write`.
    name: Dispatch mcp-trafficpeak PyPI publish (sibling repo)
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::471112700926:role/github-actions-lke-secrets-role
          aws-region: us-east-2
      - name: Retrieve GitHub App secret
        id: get-secret
        run: |
          secret=$(aws secretsmanager get-secret-value \
            --secret-id arn:aws:secretsmanager:us-east-2:471112700926:secret:ci/development/mcp-hydrolix/APP_SECRET-93IGLx \
            --output text --query SecretString)
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$secret"
          app_id=$(jq -rn --argjson s "$secret" '$s.APP_ID')
          private_key=$(jq -rn --argjson s "$secret" '$s.PRIVATE_KEY')
          if [[ -z "$app_id" || "$app_id" == "null" ]]; then
            echo "::error::APP_ID is missing or null in the retrieved secret"
            exit 1
          fi
          if [[ -z "$private_key" || "$private_key" == "null" ]]; then
            echo "::error::PRIVATE_KEY is missing or null in the retrieved secret"
            exit 1
          fi
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$private_key"
          echo "app-id=$app_id" >> "$GITHUB_OUTPUT"
          {
            echo 'private-key<<PRIVATE_KEY_EOF'
            echo "$private_key"
            echo 'PRIVATE_KEY_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Generate GitHub App token for the sibling repo
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1
        with:
          app-id: ${{ steps.get-secret.outputs.app-id }}
          private-key: ${{ steps.get-secret.outputs.private-key }}
          owner: hydrolix
          repositories: mcp-trafficpeak
      - name: Fire off workflow_dispatch at the sibling publish workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh workflow run publish.yml \
            -R hydrolix/mcp-trafficpeak \
            -f tag="${GITHUB_REF_NAME}"
  publish-docker:
    name: Upload release to GAR
    needs: prove-main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - name: Authenticate GAR
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          # Key ID: 98941823000cead5a61777398bd450e3e19539c3
          credentials_json: ${{ secrets.GCP_GKE_CI_KEY }}
      - name: "Set up GCP SDK" # needs to be done after google-github-actions/auth but before `gcloud auth configure-docker`
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3
      - name: Configure GAR for docker
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet
      - name: Get tag
        id: get_tag
        shell: bash
        run: |
          tag="v$(uv version --short)"
          echo "::notice::Tag is $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Resolve brand set from brands.toml
        shell: bash
        run: |
          set -euo pipefail
          brands="$(python3 -c 'import tomllib;print(" ".join(tomllib.load(open("brands.toml","rb"))["brands"]))')"
          echo "::notice::brands = ${brands}"
          echo "BRANDS=${brands}" >> "$GITHUB_ENV"
      - name: Build docker images for all brands
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.get_tag.outputs.tag }}"
          for brand in $BRANDS; do
            img="us-docker.pkg.dev/hdx-art/t/mcp-${brand}"
            docker buildx build --build-arg MCP_BRAND="${brand}" \
              -t "${img}:${TAG}" -t "${img}:latest" --load .
          done
      - name: Assert brand parity before pushing
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.get_tag.outputs.tag }}"
          for brand in $BRANDS; do
            docker image inspect "us-docker.pkg.dev/hdx-art/t/mcp-${brand}:${TAG}" >/dev/null \
              || { echo "::error::missing mcp-${brand} image at ${TAG}"; exit 1; }
          done
      - name: Push docker images for both brands
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.get_tag.outputs.tag }}"
          for brand in $BRANDS; do
            img="us-docker.pkg.dev/hdx-art/t/mcp-${brand}"
            docker push "${img}:${TAG}"
            docker push "${img}:latest"
          done
  publish-mcpb:
    name: Build and attach MCPB bundle to release
    needs: prove-main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # Check out by tag ref (not the default SHA-pinned checkout) so the
          # annotated tag *object* lands locally. The default checkout fetches
          # `+<sha>:refs/tags/<tag>`, leaving the ref pointing at the commit, so
          # `git cat-file -t <tag>` reports `commit` and the --notes-from-tag
          # guard below never fires. Passing an explicit ref drops the SHA pin,
          # producing a by-name refspec that pulls the tag object. fetch-depth
          # stays at the default 1 -- no full history needed.
          ref: ${{ github.ref }}
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - run: uv python install
      - name: Build MCPB bundles for all brands
        run: |
          set -euo pipefail
          BRANDS="$(python3 -c 'import tomllib;print(" ".join(tomllib.load(open("brands.toml","rb"))["brands"]))')"
          for brand in $BRANDS; do
            MCP_BRAND="$brand" bash mcpb/build.sh
          done
          VERSION="$(uv version --short)"
          for brand in $BRANDS; do
            test -f "dist/mcp-${brand}-${VERSION}.mcpb" \
              || { echo "::error::missing dist/mcp-${brand}-${VERSION}.mcpb (parity)"; exit 1; }
          done
      - name: Attach MCPB to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.mcpb --clobber
          else
            # The Release body comes from the annotated tag message. Fall back to
            # auto-generated notes when the tag is lightweight or its annotation
            # has no body, so a release is never published with empty notes.
            # `%(contents)` returns the *commit* message for a lightweight tag,
            # so gate on the ref being a real tag object (cat-file -t == tag)
            # before trusting its contents.
            if [[ "$(git cat-file -t "$TAG")" == "tag" \
                  && -n "$(git tag -l --format='%(contents)' "$TAG")" ]]; then
              gh release create "$TAG" dist/*.mcpb --notes-from-tag --title "$TAG"
            else
              echo "::warning::Tag $TAG has no annotation body; falling back to --generate-notes"
              gh release create "$TAG" dist/*.mcpb --generate-notes --title "$TAG"
            fi
          fi
  bump-version:
    name: Bump to next patch version
    needs: [publish, dispatch-trafficpeak, publish-docker, publish-mcpb]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::471112700926:role/github-actions-lke-secrets-role
          aws-region: us-east-2
      - name: Retrieve GitHub App secret
        id: get-secret
        run: |
          secret=$(aws secretsmanager get-secret-value \
            --secret-id arn:aws:secretsmanager:us-east-2:471112700926:secret:ci/development/mcp-hydrolix/APP_SECRET-93IGLx \
            --output text --query SecretString)
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$secret"
          app_id=$(jq -rn --argjson s "$secret" '$s.APP_ID')
          private_key=$(jq -rn --argjson s "$secret" '$s.PRIVATE_KEY')
          if [[ -z "$app_id" || "$app_id" == "null" ]]; then
            echo "::error::APP_ID is missing or null in the retrieved secret"
            exit 1
          fi
          if [[ -z "$private_key" || "$private_key" == "null" ]]; then
            echo "::error::PRIVATE_KEY is missing or null in the retrieved secret"
            exit 1
          fi
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$private_key"
          echo "app-id=$app_id" >> "$GITHUB_OUTPUT"
          {
            echo 'private-key<<PRIVATE_KEY_EOF'
            echo "$private_key"
            echo 'PRIVATE_KEY_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1
        with:
          app-id: ${{ steps.get-secret.outputs.app-id }}
          private-key: ${{ steps.get-secret.outputs.private-key }}
      - name: Checkout main
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - name: Install Python
        run: uv python install
      - name: Bump patch version
        run: |
          current=$(uv version --short)
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Unexpected version format from uv: '$current' (expected X.Y.Z)"
            exit 1
          fi
          IFS='.' read -r major minor patch <<< "$current"
          next="$major.$minor.$((patch + 1))"
          uv version "$next"
          uv lock --no-upgrade
          echo "current=$current" >> "$GITHUB_ENV"
          echo "next=$next" >> "$GITHUB_ENV"
      - name: Push version bump
        run: |
          if [[ -z "$next" ]]; then
            echo "::error::next version variable is empty; the version bump step may have failed"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "::notice::No changes to commit -- version may already be bumped"
            exit 0
          fi
          git commit -m "Prepare ${next} development cycle"
          git push origin main
