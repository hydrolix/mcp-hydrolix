name: Publish feature branch to GAR

on:
  workflow_dispatch:

concurrency:
  group: publish-feature-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-feature-docker:
    name: Publish feature branch to GAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Compute image tag
        id: tag
        shell: bash
        run: |
          SANITIZED=$(echo "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=branch-${SANITIZED}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - name: Authenticate GAR
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          # Key ID: 98941823000cead5a61777398bd450e3e19539c3
          credentials_json: ${{ secrets.GCP_GKE_CI_KEY }}
      - name: Set up GCP SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3
      - name: Configure GAR for docker
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet
      - name: Build docker image
        shell: bash
        run: |
          docker buildx build \
            -t us-docker.pkg.dev/hdx-art/t/mcp-hydrolix:${{ steps.tag.outputs.tag }} \
            .
      - name: Push docker image
        shell: bash
        run: |
          docker push us-docker.pkg.dev/hdx-art/t/mcp-hydrolix:${{ steps.tag.outputs.tag }}
      - name: Print image reference
        run: |
          echo "::notice::Image published: us-docker.pkg.dev/hdx-art/t/mcp-hydrolix:${{ steps.tag.outputs.tag }}"
